name: Style

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# so only one workflow run happens for each pr/push
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  style:
    name: Style
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Get exact python version
        id: python-version
        run: |
          echo "python_version=$(python --version)" >> $GITHUB_ENV

      - name: Cache pre-commit environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-pre-commit
        with:
          path: |
            ./venv/
            ~/pre-commit-cache
          key: v1-venv-precommit-${{ runner.os }}-${{ env.python_version }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        if: steps.cache-pre-commit.outputs.cache-hit != 'true'
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install pre-commit

      - name: Run Style Check
        run: |
          source venv/bin/activate
          PRE_COMMIT_HOME=~/pre-commit-cache pre-commit run --all-files
