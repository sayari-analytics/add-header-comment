name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# so only one workflow run happens for each pr/push
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.5"
            runs-on: ubuntu-24.04
            image: python:3.5
          - python-version: "3.6"
            runs-on: ubuntu-24.04
            image: python:3.6
          - python-version: "3.7"
            runs-on: ubuntu-22.04
          - python-version: "3.8"
            runs-on: ubuntu-24.04
          - python-version: "3.9"
            runs-on: ubuntu-24.04
          - python-version: "3.10"
            runs-on: ubuntu-24.04
          - python-version: "3.11"
            runs-on: ubuntu-24.04
          - python-version: "3.12"
            runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        if: ${{ !matrix.image }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test without docker
        if: ${{ !matrix.image }}
        run: ./install-and-run-tests.sh

      - name: Test with docker
        if: ${{ matrix.image }}
        run: |
          docker run \
            --name "add-header-test" \
            -d \
            -t \
            --workdir "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --entrypoint bash \
            '${{ matrix.image }}'

          docker exec "add-header-test" "$GITHUB_WORKSPACE/install-and-run-tests.sh"

      - name: Check if coverage is 100%
        run: grep "100%" coverage.log
